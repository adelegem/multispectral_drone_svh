name: Tier 1 tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      R_KEEP_PKG_SOURCE: yes
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # System libraries needed by packages in the lockfile. Must come
      # before setup-renv since renv::restore() compiles these from source.
      #   sf / terra / units      → gdal, proj, geos, udunits2
      #   igraph (via ggraph)     → glpk, gmp
      #   xml2, curl, openssl     → xml2, curl, ssl
      #   ragg / textshaping      → fontconfig, freetype, harfbuzz, fribidi
      #   tiff / png / jpeg       → image libs
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libproj-dev libgeos-dev libudunits2-dev \
            libglpk-dev libgmp-dev \
            libxml2-dev libssl-dev libcurl4-openssl-dev \
            libfontconfig1-dev libfreetype6-dev \
            libharfbuzz-dev libfribidi-dev \
            libpng-dev libtiff-dev libjpeg-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.3'
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      # Tier 1 only — taxonomic-diversity snapshot, no rasters.
      # Tier 2 (4.6 GB rasters) is deliberately not run here; see CLAUDE.md.
      - name: Run Tier 1 tests
        run: Rscript -e 'testthat::test_dir("tests")'
